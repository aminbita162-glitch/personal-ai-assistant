<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <h1>Personal AI Assistant</h1>
    <p>Talk to your assistant and let it reply or create a task automatically.</p>

    <label>Your message</label>
    <textarea id="messageInput"></textarea>

    <label for="dueDateInput" style="margin-top: 16px;">Due date</label>
    <input id="dueDateInput" type="date">

    <button id="sendButton">Send</button>

    <div id="statusText">Ready</div>

    <h3>Result</h3>
    <div id="resultBox">No result yet.</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
        <h3>Tasks List</h3>
        <button id="refreshTasksButton">Refresh Tasks</button>
    </div>

    <div id="tasksList" class="task-list">
        <div class="loading">Loading tasks...</div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;">
        <h3>Appointments</h3>
    </div>

    <div id="appointmentsList" class="task-list">
        <div class="loading">Loading appointments...</div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
