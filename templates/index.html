<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            color: #111827;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 32px;
        }

        p {
            color: #4b5563;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            margin-top: 16px;
            background: #111827;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1f2937;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #6b7280;
        }

        .section-title {
            margin-top: 28px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .example-list {
            margin: 0;
            padding-left: 18px;
            color: #374151;
        }

        .example-list li {
            margin-bottom: 8px;
        }

        .reply-card {
            background: #eef6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 16px;
            color: #1e3a8a;
        }

        .task-card {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 12px;
            padding: 16px;
        }

        .task-card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #065f46;
        }

        .task-row {
            margin-bottom: 8px;
            color: #064e3b;
        }

        .error-card {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 16px;
            color: #991b1b;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            margin-top: 6px;
        }

        .badge-priority {
            background: #ede9fe;
            color: #5b21b6;
        }

        .badge-status {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .muted {
            color: #6b7280;
            font-size: 14px;
            margin-top: 8px;
        }

        .loading {
            color: #92400e;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 12px;
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Personal AI Assistant</h1>
        <p>Talk to your assistant and let it reply or create a task automatically.</p>

        <label for="messageInput" class="label">Your message</label>
        <textarea id="messageInput" placeholder="Example: buy milk tomorrow"></textarea>

        <button id="sendButton">Send</button>

        <div class="status" id="statusText">Ready</div>

        <div class="section-title">Result</div>
        <div class="result-box" id="resultBox">No result yet.</div>

        <div class="section-title">Examples</div>
        <ul class="example-list">
            <li>buy milk tomorrow</li>
            <li>call doctor this evening</li>
            <li>plan my day</li>
            <li>what should I do today?</li>
        </ul>
    </div>

    <script>
        const sendButton = document.getElementById("sendButton");
        const messageInput = document.getElementById("messageInput");
        const resultBox = document.getElementById("resultBox");
        const statusText = document.getElementById("statusText");

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderReply(reply) {
            resultBox.innerHTML = `
                <div class="reply-card">
                    <strong>AI Reply</strong>
                    <div style="margin-top: 10px;">${escapeHtml(reply).replace(/\n/g, "<br>")}</div>
                </div>
            `;
        }

        function renderTask(task, message) {
            const description = task.description ? escapeHtml(task.description) : "No description";
            const createdAt = task.created_at ? escapeHtml(task.created_at) : "Unknown";

            resultBox.innerHTML = `
                <div class="task-card">
                    <h3>✅ Task created</h3>
                    <div class="task-row"><strong>Title:</strong> ${escapeHtml(task.title)}</div>
                    <div class="task-row"><strong>Description:</strong> ${description}</div>
                    <div class="task-row"><strong>Task ID:</strong> ${escapeHtml(task.id)}</div>
                    <div class="task-row"><strong>Created at:</strong> ${createdAt}</div>
                    <div>
                        <span class="badge badge-priority">Priority: ${escapeHtml(task.priority)}</span>
                        <span class="badge badge-status">Status: ${escapeHtml(task.status)}</span>
                    </div>
                    <div class="muted">Source message: ${escapeHtml(message)}</div>
                </div>
            `;
        }

        function renderError(errorMessage) {
            resultBox.innerHTML = `
                <div class="error-card">
                    <strong>Error</strong>
                    <div style="margin-top: 10px;">${escapeHtml(errorMessage)}</div>
                </div>
            `;
        }

        function renderFallback(data) {
            resultBox.textContent = JSON.stringify(data, null, 2);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) {
                renderError("Please enter a message.");
                return;
            }

            statusText.textContent = "Sending...";
            resultBox.innerHTML = `<div class="loading">Waiting for response...</div>`;

            try {
                const url = `/smart-ai-browser?message=${encodeURIComponent(message)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    renderError(data.message || "Request failed.");
                    statusText.textContent = "Error";
                    return;
                }

                if (data.status === "error") {
                    renderError(data.message || "Something went wrong.");
                    statusText.textContent = "Error";
                    return;
                }

                if (data.action === "task" && data.task) {
                    renderTask(data.task, message);
                    statusText.textContent = "Done";
                    return;
                }

                if (data.action === "reply" && data.reply) {
                    renderReply(data.reply);
                    statusText.textContent = "Done";
                    return;
                }

                renderFallback(data);
                statusText.textContent = "Done";
            } catch (error) {
                renderError("Request failed: " + error.message);
                statusText.textContent = "Error";
            }
        }

        sendButton.addEventListener("click", sendMessage);

        messageInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
