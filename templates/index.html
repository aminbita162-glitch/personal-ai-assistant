<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            color: #111827;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 32px;
        }

        p {
            color: #4b5563;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            margin-top: 16px;
            background: #111827;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .task-actions button {
            margin-right: 8px;
            margin-top: 10px;
        }

        .done-btn {
            background: #059669;
        }

        .pending-btn {
            background: #d97706;
        }

        .delete-btn {
            background: #dc2626;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            margin-top: 6px;
        }

        .badge-priority {
            background: #ede9fe;
            color: #5b21b6;
        }

        .badge-status {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .task-item {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: #ffffff;
        }

        .task-done {
            background: #ecfdf5;
            text-decoration: line-through;
        }

        .task-list {
            display: grid;
            gap: 14px;
        }

        .loading {
            padding: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Personal AI Assistant</h1>
    <p>Talk to your assistant and let it reply or create a task automatically.</p>

    <label>Your message</label>
    <textarea id="messageInput"></textarea>

    <button onclick="sendMessage()">Send</button>

    <div id="statusText">Ready</div>

    <h3>Result</h3>
    <div id="resultBox">No result yet.</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
        <h3>Tasks List</h3>
        <button onclick="loadTasks()">Refresh Tasks</button>
    </div>

    <div id="tasksList" class="task-list">
        <div class="loading">Loading tasks...</div>
    </div>
</div>

<script>
const resultBox = document.getElementById("resultBox");
const statusText = document.getElementById("statusText");
const tasksList = document.getElementById("tasksList");

function renderTasks(tasks) {
    tasksList.innerHTML = tasks.map(task => {
        return `
        <div class="task-item ${task.status === 'done' ? 'task-done' : ''}">
            <strong>${task.title}</strong><br>
            ${task.description || "No description"}<br>
            Task ID: ${task.id}<br>
            Created at: ${task.created_at}<br>

            <span class="badge badge-priority">Priority: ${task.priority}</span>
            <span class="badge badge-status">Status: ${task.status}</span>

            <div class="task-actions">
                <button class="done-btn" onclick="updateTask(${task.id}, 'done')">Mark as Done</button>
                <button class="pending-btn" onclick="updateTask(${task.id}, 'pending')">Mark as Pending</button>
                <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
            </div>
        </div>
        `;
    }).join("");
}

async function loadTasks() {
    tasksList.innerHTML = `<div class="loading">Loading tasks...</div>`;
    const res = await fetch("/tasks");
    const data = await res.json();
    renderTasks(data.tasks);
}

async function sendMessage() {
    const message = document.getElementById("messageInput").value;
    statusText.textContent = "Sending...";

    const res = await fetch(`/smart-ai-browser?message=${encodeURIComponent(message)}`);
    const data = await res.json();

    resultBox.textContent = JSON.stringify(data, null, 2);
    statusText.textContent = "Done";

    loadTasks();
}

async function updateTask(id, status) {
    await fetch(`/tasks/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
    });

    statusText.textContent = "Task updated";
    loadTasks();
}

async function deleteTask(id) {
    if (!confirm("Delete this task?")) return;

    await fetch(`/tasks/${id}`, {
        method: "DELETE"
    });

    statusText.textContent = "Task deleted";
    loadTasks();
}

loadTasks();
</script>
</body>
</html>
